{% extends "base.html" %}

{% block title %}Galaxy Ring Detection - Predict One{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Predict One Galaxy</h1>
    <div class="actions">
        <a href="/" class="btn btn-secondary">Back to Grid</a>
    </div>
</div>

<div class="predict-form-container">
    <div class="predict-form-options">
        <label class="fast-prediction-option" title="Skip test-time augmentation (1 pass instead of 8). Faster but slightly less accurate.">
            <input type="checkbox" id="fast-prediction" />
            Fast prediction
        </label>
    </div>
    <div class="predict-form-col">
        <form
            hx-post="/api/predict_from_url"
            hx-target="#result-area"
            hx-swap="innerHTML"
            hx-select=".predict-result-card"
            hx-indicator="#spinner"
            class="predict-form"
        >
            <input type="hidden" name="fast" id="fast-prediction-url" value="false" />
            <label for="legacy_survey_url">Legacy Survey Cutout URL</label>
            <div class="url-input-row">
                <input
                    type="url"
                    id="legacy_survey_url"
                    name="legacy_survey_url"
                    placeholder="https://www.legacysurvey.org/viewer/cutout.fits?ra=57.85&dec=-15.40&layer=ls-dr9&pixscale=0.262&size=256&bands=grz"
                    required
                />
                <button type="submit" class="btn btn-primary">Predict</button>
            </div>
        </form>
    </div>

    <div class="predict-form-divider">
        <span>or</span>
    </div>

    <div class="predict-form-col">
        <form
            method="post"
            enctype="multipart/form-data"
            hx-post="/api/predict_from_fits"
            hx-target="#result-area"
            hx-swap="innerHTML"
            hx-select=".predict-result-card"
            hx-indicator="#spinner"
            hx-encoding="multipart/form-data"
            class="predict-form"
        >
            <input type="hidden" name="fast" id="fast-prediction-fits" value="false" />
            <label for="fits_file">Upload FITS File</label>
            <div class="file-input-row">
                <input
                    type="file"
                    id="fits_file"
                    name="fits_file"
                    accept=".fits,.fit"
                    required
                />
                <button type="submit" class="btn btn-primary">Predict</button>
            </div>
        </form>
    </div>

    <div id="spinner" class="htmx-indicator">
        <span class="spinner"></span> Processing...
    </div>
</div>

<div id="result-area" class="result-area"></div>

<!-- Expand modal -->
<div id="predict-expand-modal" class="expand-modal" role="dialog" aria-modal="true" aria-labelledby="predict-expand-modal-title" hidden>
    <div class="expand-modal-backdrop"></div>
    <div class="expand-modal-content">
        <div class="expand-modal-header">
            <h2 id="predict-expand-modal-title" class="expand-modal-title"></h2>
            <button type="button" class="btn-expand-close" id="predict-close-expand-modal" title="Close" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="expand-modal-body">
            <div id="predict-expand-modal-image" class="expand-modal-image" hidden></div>
            <div id="predict-expand-modal-3d-wrapper" class="expand-modal-3d-wrapper" hidden>
                <div class="lupton-controls lupton-controls-modal">
                    <label class="lupton-control">
                        <span class="lupton-label">Stretch</span>
                        <input type="range" id="predict-lupton-stretch-modal" min="0.1" max="2" step="0.1" value="0.5" />
                        <span class="lupton-value" id="predict-lupton-stretch-value-modal">0.5</span>
                    </label>
                    <label class="lupton-control">
                        <span class="lupton-label">Q</span>
                        <input type="range" id="predict-lupton-q-modal" min="1" max="20" step="1" value="6" />
                        <span class="lupton-value" id="predict-lupton-q-value-modal">6</span>
                    </label>
                </div>
                <div class="channel-toggles channel-toggles-modal" id="predict-channel-toggles-modal">
                    <label class="channel-toggle"><input type="checkbox" name="channel-modal" value="g" checked> g</label>
                    <label class="channel-toggle"><input type="checkbox" name="channel-modal" value="r" checked> r</label>
                    <label class="channel-toggle"><input type="checkbox" name="channel-modal" value="z" checked> z</label>
                    <label class="channel-toggle channel-toggle-zwrap"><input type="checkbox" name="zwrap-modal" id="predict-zwrap-modal"> Z-axis wrap [0, 1]</label>
                    <label class="channel-toggle channel-toggle-zwrap"><input type="checkbox" name="solid-colors-modal" id="predict-solid-colors-modal"> Solid colors</label>
                </div>
                <div id="predict-expand-modal-3d" class="expand-modal-3d"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
